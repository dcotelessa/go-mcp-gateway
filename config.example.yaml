# Go MCP Gateway — example configuration
# Copy to config.yaml and edit for your environment.
# All values shown are defaults unless otherwise noted.

server:
  port: 8080

mcp:
  session_idle_ttl_minutes: 30
  endpoint_path: /mcp

llama_server:
  # Required: path to llama-server binary (or set LLAMA_SERVER_PATH env var)
  exec_path: /home/dcotelessa/llama.cpp/build/bin/llama-server
  health_timeout_sec: 60
  stop_timeout_sec: 10
  log_dir: ./logs

vram:
  total_mib: 16311      # RTX 5060 Ti
  reserved_mib: 1024    # headroom for OS + other processes

# Model registry — tier name maps to llama-server config
# Tier names must match the router complexity→tier table
models:
  local_ornith:
    path: /home/dcotelessa/models/ornith-1.0-35b-Q4_K_M.gguf
    vram_requirement_mib: 20000   # requires GPU/CPU split
    port: 8081
    extra_args:
      - --ctx-size
      - "4096"
      - --parallel
      - "1"

  local_qwen:
    path: /home/dcotelessa/models/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
    vram_requirement_mib: 22000   # requires GPU/CPU split
    port: 8082
    extra_args:
      - --ctx-size
      - "4096"
      - --parallel
      - "1"

  local_glm:
    path: /home/dcotelessa/models/GLM-4.7-Flash-UD-Q3_K_XL.gguf
    vram_requirement_mib: 13000   # fits in VRAM (tight)
    port: 8083
    extra_args:
      - --ctx-size
      - "8192"
      - --parallel
      - "2"

remote_apis:
  # DeepSeek V4-Flash — primary cheap API tier ($0.14/M input)
  deepseek_base_url: https://api.deepseek.com/v1
  deepseek_api_key: ""  # set via DEEPSEEK_API_KEY env var

  # GLM-5.2 via Z.ai Coding Plan — premium tier (off-peak 11PM-3AM)
  # Falls back to OpenRouter on-peak ($0.95/M input)
  glm_base_url: https://api.z.ai/api/coding/paas/v4
  glm_api_key: ""       # set via GLM_API_KEY env var (ZHIPU_API_KEY)

policy:
  # Per-tier daily token budgets (tokens, not cost)
  budget_deepseek_daily: 1000000
  budget_glm_daily: 500000

  # Per-session rate limiting
  session_rate_per_min: 20
  session_tokens_per_hour: 200000
  session_idle_ttl_min: 30
  budget_sweep_interval_min: 5

lsp:
  idle_timeout_min: 15
  request_timeout_sec: 10
  init_timeout_sec: 30

rest:
  shutdown_drain_sec: 10
